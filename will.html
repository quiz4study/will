<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Quiz: Future Will (Simple)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-card:hover { transform: translateY(-2px); transition: all 0.2s; }
        .correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="quiz-container" class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Prediction, Promise or Future Fact?</h1>
            <p class="text-indigo-100 mt-2">Frasi semplici per imparare l'uso di "will"</p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress" class="bg-indigo-400 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Content -->
        <div class="p-8">
            <div id="score-display" class="hidden mb-6 text-center">
                <span class="text-lg font-semibold text-slate-700">Punteggio: <span id="score-val">0</span> / <span id="total-val">0</span></span>
            </div>

            <div id="question-area">
                <div class="mb-6">
                    <div class="flex justify-between items-center">
                        <span id="q-number" class="text-sm font-bold text-indigo-500 uppercase tracking-widest">Domanda 1</span>
                        <button id="hint-btn" onclick="toggleHint()" class="flex items-center gap-1 text-sm font-medium text-amber-600 hover:text-amber-700 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5S19.832 5.477 21 6.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                            </svg>
                            Aiuto (Traduzione)
                        </button>
                    </div>
                    <h2 id="q-text" class="text-xl font-medium text-slate-800 mt-2 italic">Caricamento...</h2>
                    <div id="hint-box" class="hidden mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg text-amber-800 text-sm italic fade-in">
                        <!-- Traduzione qui -->
                    </div>
                </div>

                <div class="grid gap-3">
                    <button onclick="checkAnswer('prediction')" class="option-card w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 font-medium text-slate-700 transition-colors">
                        Prediction (Predizione)
                    </button>
                    <button onclick="checkAnswer('promise')" class="option-card w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 font-medium text-slate-700 transition-colors">
                        Promise/Offer (Promessa/Offerta)
                    </button>
                    <button onclick="checkAnswer('fact')" class="option-card w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 font-medium text-slate-700 transition-colors">
                        Future Fact (Evento/Fatto futuro)
                    </button>
                </div>
            </div>

            <!-- Feedback Message -->
            <div id="feedback" class="mt-6 p-4 rounded-lg hidden text-center font-medium"></div>

            <!-- Navigation -->
            <div class="mt-8 flex justify-center">
                <button id="next-btn" onclick="nextQuestion()" class="hidden bg-indigo-600 text-white px-8 py-3 rounded-full font-bold hover:bg-indigo-700 shadow-lg transition-all">
                    Prossima Domanda →
                </button>
                <button id="restart-btn" onclick="resetQuiz()" class="hidden bg-slate-800 text-white px-8 py-3 rounded-full font-bold hover:bg-slate-900 shadow-lg transition-all">
                    Ricomincia Quiz
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { text: "I will open the window for you.", translation: "Aprirò la finestra per te.", correct: "promise" },
            { text: "The sun will rise tomorrow morning.", translation: "Il sole sorgerà domani mattina.", correct: "fact" },
            { text: "I think it will be hot today.", translation: "Penso che farà caldo oggi.", correct: "prediction" },
            { text: "I'll help you with your homework.", translation: "Ti aiuterò con i compiti.", correct: "promise" },
            { text: "My sister will be ten years old next month.", translation: "Mia sorella compirà dieci anni il mese prossimo.", correct: "fact" },
            { text: "I'm sure you will find your keys.", translation: "Sono sicuro che troverai le tue chiavi.", correct: "prediction" },
            { text: "I'll call you later, I promise!", translation: "Ti chiamo più tardi, lo prometto!", correct: "promise" },
            { text: "Saturday will be the first day of May.", translation: "Sabato sarà il primo giorno di maggio.", correct: "fact" },
            { text: "Maybe he will arrive late.", translation: "Forse lui arriverà in ritardo.", correct: "prediction" },
            { text: "I'll wash the dishes tonight.", translation: "Laverò io i piatti stasera.", correct: "promise" }
        ];

        let currentQ = 0;
        let score = 0;
        let answered = false;

        const qText = document.getElementById('q-text');
        const qNum = document.getElementById('q-number');
        const hintBox = document.getElementById('hint-box');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const progress = document.getElementById('progress');
        const scoreDisplay = document.getElementById('score-display');

        function loadQuestion() {
            answered = false;
            const q = quizData[currentQ];
            qText.innerText = `"${q.text}"`;
            qNum.innerText = `Domanda ${currentQ + 1} di ${quizData.length}`;
            hintBox.innerText = `Traduzione: ${q.translation}`;
            hintBox.classList.add('hidden');
            feedback.classList.add('hidden');
            nextBtn.classList.add('hidden');
            
            document.querySelectorAll('.option-card').forEach(btn => {
                btn.className = "option-card w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 font-medium text-slate-700 transition-colors";
                btn.disabled = false;
            });

            progress.style.width = `${(currentQ / quizData.length) * 100}%`;
            scoreDisplay.classList.remove('hidden');
            document.getElementById('score-val').innerText = score;
            document.getElementById('total-val').innerText = currentQ;
        }

        function toggleHint() {
            hintBox.classList.toggle('hidden');
        }

        function checkAnswer(choice) {
            if(answered) return;
            answered = true;

            const correct = quizData[currentQ].correct;
            const buttons = document.querySelectorAll('.option-card');
            
            buttons.forEach(btn => {
                btn.disabled = true;
                const type = btn.innerText.toLowerCase();
                if (type.includes(correct)) {
                    btn.classList.add('correct');
                } else if (type.includes(choice) && choice !== correct) {
                    btn.classList.add('wrong');
                }
            });

            if (choice === correct) {
                score++;
                feedback.innerText = "Bravo! È corretto. ✨";
                feedback.className = "mt-6 p-4 rounded-lg text-center font-medium bg-green-100 text-green-800";
            } else {
                feedback.innerText = "Ops! La risposta corretta è evidenziata in verde.";
                feedback.className = "mt-6 p-4 rounded-lg text-center font-medium bg-red-100 text-red-800";
            }
            
            feedback.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
            
            if (currentQ === quizData.length - 1) {
                nextBtn.innerText = "Vedi Risultato Finale";
            }
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            progress.style.width = "100%";
            document.getElementById('question-area').classList.add('hidden');
            nextBtn.classList.add('hidden');
            feedback.classList.add('hidden');
            
            const percentage = (score / quizData.length) * 100;
            let msg = "";
            if(percentage === 100) msg = "Eccellente! Hai risposto correttamente a tutto. 🏆";
            else if(percentage >= 70) msg = "Ottimo lavoro! Continua così. 👍";
            else msg = "Buon tentativo! Prova a rifare il quiz per migliorare. 📚";

            qNum.innerText = "Quiz Completato";
            qText.innerHTML = `Punteggio finale:<br><span class="text-4xl font-bold text-indigo-600">${score} / ${quizData.length}</span><br><p class="text-base font-normal mt-4 text-slate-600">${msg}</p>`;
            
            restartBtn.classList.remove('hidden');
        }

        function resetQuiz() {
            currentQ = 0;
            score = 0;
            document.getElementById('question-area').classList.remove('hidden');
            restartBtn.classList.add('hidden');
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
