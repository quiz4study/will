<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Quiz: Future Will (Second Chance)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-card:hover:not(:disabled) { transform: translateY(-2px); transition: all 0.2s; }
        .correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; opacity: 0.7; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="quiz-container" class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Prediction, Promise or Future Fact?</h1>
            <p class="text-indigo-100 mt-2">Sbagliare è umano: hai un secondo tentativo!</p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-200 h-2">
            <div id="progress" class="bg-indigo-400 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Content -->
        <div class="p-8">
            <div id="score-display" class="mb-6 text-center">
                <span class="text-lg font-semibold text-slate-700">Punteggio: <span id="score-val">0</span> / <span id="total-val">0</span></span>
            </div>

            <div id="question-area">
                <div class="mb-6">
                    <div class="flex justify-between items-center">
                        <span id="q-number" class="text-sm font-bold text-indigo-500 uppercase tracking-widest">Domanda 1</span>
                        <button id="hint-btn" onclick="toggleHint()" class="flex items-center gap-1 text-sm font-medium text-amber-600 hover:text-amber-700 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5S19.832 5.477 21 6.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                            </svg>
                            Aiuto (Traduzione)
                        </button>
                    </div>
                    <h2 id="q-text" class="text-xl font-medium text-slate-800 mt-2 italic">Caricamento...</h2>
                    <div id="hint-box" class="hidden mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg text-amber-800 text-sm italic fade-in"></div>
                </div>

                <div class="grid gap-3" id="options-grid">
                    <button data-type="prediction" onclick="checkAnswer('prediction', this)" class="option-card w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 font-medium text-slate-700 transition-colors">
                        Prediction (Predizione)
                    </button>
                    <button data-type="promise" onclick="checkAnswer('promise', this)" class="option-card w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 font-medium text-slate-700 transition-colors">
                        Promise/Offer (Promessa/Offerta)
                    </button>
                    <button data-type="fact" onclick="checkAnswer('fact', this)" class="option-card w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 font-medium text-slate-700 transition-colors">
                        Future Fact (Evento/Fatto futuro)
                    </button>
                </div>
            </div>

            <!-- Suggestion / Feedback Message -->
            <div id="feedback" class="mt-6 p-4 rounded-lg hidden text-center font-medium fade-in"></div>

            <!-- Navigation -->
            <div class="mt-8 flex justify-center">
                <button id="next-btn" onclick="nextQuestion()" class="hidden bg-indigo-600 text-white px-8 py-3 rounded-full font-bold hover:bg-indigo-700 shadow-lg transition-all">
                    Prossima Domanda →
                </button>
                <button id="restart-btn" onclick="resetQuiz()" class="hidden bg-slate-800 text-white px-8 py-3 rounded-full font-bold hover:bg-slate-900 shadow-lg transition-all">
                    Ricomincia Quiz
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { text: "I'll make you a cup of tea.", translation: "Ti preparerò una tazza di tè.", correct: "promise", suggestion: "È un'azione gentile fatta per qualcuno in questo momento." },
            { text: "It will be Monday tomorrow.", translation: "Domani sarà lunedì.", correct: "fact", suggestion: "È qualcosa di matematicamente o cronologicamente certo." },
            { text: "I think you will win the game.", translation: "Penso che vincerai la partita.", correct: "prediction", suggestion: "Esprime un'opinione personale (introdotta da 'I think')." },
            { text: "I'll buy some milk later.", translation: "Comprerò del latte più tardi.", correct: "promise", suggestion: "È un'intenzione o un impegno preso mentre si parla." },
            { text: "Spring will start in March.", translation: "La primavera inizierà a marzo.", correct: "fact", suggestion: "Le stagioni seguono un calendario fisso." },
            { text: "I believe it will snow tonight.", translation: "Credo che nevicherà stanotte.", correct: "prediction", suggestion: "È una supposizione basata su ciò che credi ('I believe')." },
            { text: "I'll clean my bedroom on Saturday.", translation: "Pulirò la mia camera sabato.", correct: "promise", suggestion: "Ti stai impegnando a fare un'attività." },
            { text: "The movie will finish at 10 PM.", translation: "Il film finirà alle 22:00.", correct: "fact", suggestion: "Gli orari degli spettacoli sono fatti prestabiliti." },
            { text: "Maybe she will like this gift.", translation: "Forse le piacerà questo regalo.", correct: "prediction", suggestion: "Usa 'Maybe' per indicare una possibilità o supposizione." },
            { text: "I'll carry the shopping for you.", translation: "Ti porterò io la spesa.", correct: "promise", suggestion: "Ti stai offrendo di aiutare qualcuno." },
            { text: "My father will be fifty next year.", translation: "Mio padre compirà cinquant'anni l'anno prossimo.", correct: "fact", suggestion: "L'età che avanza è un dato di fatto inevitabile." },
            { text: "I'm sure the exam will be easy.", translation: "Sono sicuro che l'esame sarà facile.", correct: "prediction", suggestion: "È una tua convinzione personale ('I'm sure')." },
            { text: "I'll send you the photos tonight.", translation: "Ti manderò le foto stasera.", correct: "promise", suggestion: "È una promessa fatta a un amico." },
            { text: "School will close for the holidays.", translation: "La scuola chiuderà per le vacanze.", correct: "fact", suggestion: "È un evento programmato dal calendario scolastico." },
            { text: "I think the train will arrive soon.", translation: "Penso che il treno arriverà presto.", correct: "prediction", suggestion: "È una tua stima basata sull'attesa." }
        ];

        let currentQ = 0;
        let score = 0;
        let attempts = 0; // Conta i tentativi per la domanda corrente
        let firstTryCorrect = false;

        const qText = document.getElementById('q-text');
        const qNum = document.getElementById('q-number');
        const hintBox = document.getElementById('hint-box');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const progress = document.getElementById('progress');
        const scoreVal = document.getElementById('score-val');
        const totalVal = document.getElementById('total-val');

        function loadQuestion() {
            attempts = 0;
            const q = quizData[currentQ];
            qText.innerText = `"${q.text}"`;
            qNum.innerText = `Domanda ${currentQ + 1} di ${quizData.length}`;
            hintBox.innerText = `Traduzione: ${q.translation}`;
            hintBox.classList.add('hidden');
            feedback.classList.add('hidden');
            nextBtn.classList.add('hidden');
            
            document.querySelectorAll('.option-card').forEach(btn => {
                btn.className = "option-card w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 font-medium text-slate-700 transition-colors";
                btn.disabled = false;
            });

            progress.style.width = `${(currentQ / quizData.length) * 100}%`;
            scoreVal.innerText = score;
            totalVal.innerText = currentQ;
        }

        function toggleHint() {
            hintBox.classList.toggle('hidden');
        }

        function checkAnswer(choice, element) {
            const correct = quizData[currentQ].correct;
            const suggestion = quizData[currentQ].suggestion;
            attempts++;

            if (choice === correct) {
                // Risposta corretta
                element.classList.add('correct');
                
                // Disabilita tutto dopo la risposta corretta
                document.querySelectorAll('.option-card').forEach(btn => btn.disabled = true);
                
                if (attempts === 1) {
                    score++;
                    scoreVal.innerText = score;
                    feedback.innerText = "Eccellente! Corretto al primo colpo! ✨";
                } else {
                    feedback.innerText = "Giusto! Ci sei arrivato al secondo tentativo. 👍";
                }
                
                feedback.className = "mt-6 p-4 rounded-lg text-center font-medium bg-green-100 text-green-800 fade-in";
                nextBtn.classList.remove('hidden');
            } else {
                // Risposta sbagliata
                element.classList.add('wrong');
                element.disabled = true;

                if (attempts === 1) {
                    feedback.innerText = `Ops! Non è corretto. Suggerimento: ${suggestion}`;
                    feedback.className = "mt-6 p-4 rounded-lg text-center font-medium bg-amber-100 text-amber-800 fade-in";
                    feedback.classList.remove('hidden');
                } else {
                    // Se sbaglia anche il secondo tentativo (anche se ci sono 3 opzioni, forziamo la soluzione)
                    feedback.innerText = `Ancora no. La risposta corretta era: ${correct.toUpperCase()}.`;
                    feedback.className = "mt-6 p-4 rounded-lg text-center font-medium bg-red-100 text-red-800 fade-in";
                    
                    // Mostra la corretta
                    document.querySelectorAll('.option-card').forEach(btn => {
                        btn.disabled = true;
                        if(btn.dataset.type === correct) btn.classList.add('correct');
                    });
                    nextBtn.classList.remove('hidden');
                }
            }
            
            if (currentQ === quizData.length - 1 && (choice === correct || attempts >= 2)) {
                nextBtn.innerText = "Vedi Risultato Finale";
            }
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            progress.style.width = "100%";
            document.getElementById('question-area').classList.add('hidden');
            nextBtn.classList.add('hidden');
            feedback.classList.add('hidden');
            
            const percentage = (score / quizData.length) * 100;
            let msg = "";
            if(percentage === 100) msg = "Incredibile! 15/15 al primo colpo! 🏆";
            else if(percentage >= 80) msg = "Ottimo lavoro! La tua conoscenza è molto solida. 🌟";
            else if(percentage >= 50) msg = "Buon risultato! Ricorda che i punti valgono solo al primo tentativo. 👍";
            else msg = "Puoi migliorare! Riprova facendo attenzione ai suggerimenti. 📚";

            qNum.innerText = "Quiz Completato";
            qText.innerHTML = `Punteggio (solo primi tentativi):<br><span class="text-4xl font-bold text-indigo-600">${score} / ${quizData.length}</span><br><p class="text-base font-normal mt-4 text-slate-600">${msg}</p>`;
            
            restartBtn.classList.remove('hidden');
        }

        function resetQuiz() {
            currentQ = 0;
            score = 0;
            document.getElementById('question-area').classList.remove('hidden');
            restartBtn.classList.add('hidden');
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
